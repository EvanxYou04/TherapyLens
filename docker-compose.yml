version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: therapylens
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: server /data
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://user:password@db/therapylens
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: your-secret-key
      OPENAI_API_KEY: your-openai-key
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
      - minio
    volumes:
      - ./backend:/app
      - /app/__pycache__

  worker:
    build: ./backend
    command: celery -A app.worker worker --loglevel=info
    environment:
      DATABASE_URL: postgresql://user:password@db/therapylens
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: your-secret-key
      OPENAI_API_KEY: your-openai-key
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    depends_on:
      - db
      - redis
      - minio
    volumes:
      - ./backend:/app

volumes:
  postgres_data:
  minio_data: